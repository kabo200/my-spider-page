<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider Quiz - be inspired</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: brown;
            color: #333;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: light brown;
            color: brown;
            padding: 20px text-align;
            text-align: center;
        }

        nav {
            background-color: var(--bg);
            text-align: center;
            padding: 10px 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            margin: 0 5px;
            font-weight: bold;
        }

        nav a:hover, nav a.active {
            background-color: #1abc9c;
            border-radius: 4px;
        }

        .container {
            max-width: 650px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: #2c3e50;
            margin-top: 0;
        }

        .quiz-progress {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .question {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: #ecf0f1;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            padding: 14px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background-color: #e0e6e8;
            border-color: #34495e;
        }

    
        .results-card {
            text-align: center;
            display: none;
        }

        .score-display {
            font-size: 3rem;
            font-weight: bold;
            color: #1abc9c;
            margin: 20px 0;
        }

        .restart-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }

        .restart-btn:hover {
            background-color: #1abc9c;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Spiders Educational Hub</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
        <a href="quiz.html" class="active">Quiz</a>
    </nav>

    <div class="container">
        
        <div id="quiz-box">
            <div class="quiz-progress" id="progress">Question 1 of 4</div>
            <div class="question" id="question-text">Loading question...</div>
            <div class="options-container" id="options-box">
                
            </div>
        </div>


        <div id="results-box" class="results-card">
            <h2>Quiz Completed!</h2>
            <p>Your spider knowledge score is:</p>
            <div class="score-display" id="final-score">0 / 0</div>
            <p id="feedback-text">Good effort!</p>
            <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Spiders Educational Hub. All rights reserved.</p>
    </footer>

    <script>
    
        const quizData = [
            {
                question: "How many legs do spiders typically have?",
                options: ["6 legs", "8 legs", "10 legs", "12 legs"],
                correct: 1 // Index of "8 legs"
            },
            {
                question: "Which of these spiders is famous for a red hourglass shape on its abdomen?",
                options: ["Wolf Spider", "Daddy Long Legs", "Black Widow", "Huntsman Spider"],
                correct: 2
            },
            {
                question: "True or False: All species of spiders spin webs to catch their prey.",
                options: ["True", "False (Some hunt actively without webs)"],
                correct: 1
            },
            {
                question: "What is the name of the specialized organ spiders use to produce silk?",
                options: ["Spinnerets", "Pedipalps", "Chelicerae", "Cephalothorax"],
                correct: 0
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        const progressEl = document.getElementById("progress");
        const questionTextEl = document.getElementById("question-text");
        const optionsBoxEl = document.getElementById("options-box");
        const quizBoxEl = document.getElementById("quiz-box");
        const resultsBoxEl = document.getElementById("results-box");
        const finalScoreEl = document.getElementById("final-score");
        const feedbackTextEl = document.getElementById("feedback-text");

        function loadQuestion() {
            // Get current question object
            const currentQuestion = quizData[currentQuestionIndex];
            
            // Update progress text and question text
            progressEl.textContent = `Question ${currentQuestionIndex + 1} of ${quizData.length}`;
            questionTextEl.textContent = currentQuestion.question;
            
        
            optionsBoxEl.innerHTML = "";
            
        
            currentQuestion.options.forEach((option, index) => {
                const button = document.createElement("button");
                button.classList.add("option-btn");
                button.textContent = option;
                
                button.addEventListener("click", () => handleAnswer(index));
                optionsBoxEl.appendChild(button);
            });
        }

        function handleAnswer(selectedIndex) {
            const currentQuestion = quizData[currentQuestionIndex];
            
            
            if (selectedIndex === currentQuestion.correct) {
                score++;
            }
            
            
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            
            quizBoxEl.style.display = "none";
            resultsBoxEl.style.display = "block";
            
            finalScoreEl.textContent = `${score} / ${quizData.length}`;
            
            
            if (score === quizData.length) {
                feedbackTextEl.textContent = "Flawless! You're an absolute spider expert! 🕷️";
            } else if (score >= quizData.length / 2) {
                feedbackTextEl.textContent = "Great job! You know your arachnids well.";
            } else {
                feedbackTextEl.textContent = "Keep learning! Spiders are fascinating once you get to know them.";
            }
        }

        function restartQuiz() {
            score = 0;
            currentQuestionIndex = 0;
            resultsBoxEl.style.display = "none";
            quizBoxEl.style.display = "block";
            loadQuestion();
        }

        
        loadQuestion();
    </script>
</body>
</html>
