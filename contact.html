<header>
    <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>
</header>

<main class="contact-container">

    <h1>Contact Us</h1>

    <p>If you have questions about spiders or this website, send us a message below:</p>

    <!-- CONTACT FORM -->
    <form class="contact-form">

        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="message">Message</label>
        <textarea id="message" rows="5" placeholder="Write your message..." required></textarea>

        <button type="submit">Send Message</button>

    </form>

    <!-- LINKS SECTION -->
    <section class="learn-more">
        <h2>Learn More About Spiders</h2>

        <ul>
            <li><a href="https://www.nationalgeographic.com/animals/invertebrates/facts/spiders" target="_blank">National Geographic</a></li>
            <li><a href="https://www.britannica.com/animal/spider-arachnid" target="_blank">Britannica</a></li>
            <li><a href="https://australian.museum/learn/animals/spiders/" target="_blank">Australian Museum</a></li>
            <li><a href="https://www.livescience.com/topics/spiders" target="_blank">Live Science</a></li>
        </ul>
    </section>

</main>
